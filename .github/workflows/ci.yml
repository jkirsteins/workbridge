name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel older in-flight runs on the same ref when a new commit arrives.
# For a solo repo this is pure minute-saver, not a correctness concern.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    # `cargo fmt --check` is platform-independent (rustfmt normalises
    # line endings and always targets the canonical format). Running it
    # on a single Linux host is strictly cheaper and equivalent to
    # running it everywhere.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    # Clippy runs per-target: lints can fire on one OS and not another
    # because cfg-gated code paths compile differently. We want a
    # PR-time signal that Windows-only code paths still lint clean.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    # Run the test suite on Linux, macOS, and Windows so future PRs
    # that regress Windows compatibility are caught before tagging.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
