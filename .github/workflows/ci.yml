name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel older in-flight runs on the same ref when a new commit arrives.
# For a solo repo this is pure minute-saver, not a correctness concern.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Two-invocation pattern: production code is denied
      # unwrap/expect/panic; tests are allowed to use those idiomatically.
      # The carve-out is done via `-A` flags at the CLI, not via any
      # source-level `#[allow]` (which `clippy::allow_attributes` denies
      # crate-wide). See docs/hygiene-campaign/phase-3-calibration.md
      # for the full rationale.
      # `--bins` (no `--lib`; workbridge has no library target today);
      # tests ship their own invocation below.
      - run: cargo clippy --bins --all-features -- -D warnings
      - run: cargo clippy --tests --all-features -- -D warnings -A clippy::unwrap_used -A clippy::expect_used -A clippy::panic

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check advisories licenses bans sources

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-machete --locked
      - run: cargo machete

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.45.1
        with:
          config: typos.toml

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./hooks/budget-check.sh

  ratatui-builtin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./hooks/ratatui-builtin-check.sh
