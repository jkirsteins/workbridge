[package]
name = "workbridge"
version = "0.1.1"
edition = "2024"
rust-version = "1.88"
license = "MIT"
description = "Multi-repo coding agent orchestration in your terminal."
repository = "https://github.com/jkirsteins/workbridge"
homepage = "https://github.com/jkirsteins/workbridge"
readme = "README.md"
keywords = ["claude", "codex", "tui", "workflow", "worktree"]
categories = ["command-line-utilities", "development-tools"]
exclude = [
    ".claude/**",
    "AGENTS.md",
    "CLAUDE.md",
    "docs/superpowers/**",
    "hooks/**",
    "workbridge-sidebar-playground.html",
]

[dependencies]
tui-term = "0.3"
vt100 = "0.15"
portable-pty = "0.9"
ctrlc = { version = "3", features = ["termination"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
regex = "1"
uuid = { version = "1", features = ["v4"] }
directories = "5"
rat-salsa = "4"
rat-widget = "3"
rat-event = "2"
rat-focus = "2"
crossbeam-channel = "0.5"
ratatui-core = "0.1"
ratatui-crossterm = "0.1"
ratatui-widgets = "0.3"
unicode-width = "0.2"
arboard = "3"
which = "6"

# `libc` provides the Unix-only `killpg` / `SIGTERM` / `SIGKILL` constants
# used by `src/app.rs` (rebase-gate subprocess teardown). The Windows build
# does not need `libc`; `portable-pty` (whose Windows backend uses ConPTY)
# and `ctrlc` (whose Windows backend uses SetConsoleCtrlHandler) provide all
# the cross-platform primitives we need.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# `windows-sys` provides the Win32 `OpenProcess` / `TerminateProcess`
# symbols used by the rebase-gate cancellation path in `src/app.rs`
# (the Windows-only `terminate_process_by_id` helper). Scoped to
# Windows so the Unix / macOS builds don't pull it in.
#
# `uds_windows` provides `UnixListener` / `UnixStream` compatible types
# backed by the AF_UNIX support Windows 10 1803+ ships natively, so the
# MCP socket server in `src/mcp.rs` can reuse the same logical flow on
# both platforms (the std::os::unix::net types are Unix-only).
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_System_Threading"] }
uds_windows = "1"

[features]
integration = []

[dev-dependencies]
insta = "1"
tempfile = "3"
