[package]
name = "workbridge"
version = "0.1.1"
edition = "2024"
rust-version = "1.88"
license = "MIT"
description = "Multi-repo coding agent orchestration in your terminal."
repository = "https://github.com/jkirsteins/workbridge"
homepage = "https://github.com/jkirsteins/workbridge"
readme = "README.md"
keywords = ["claude", "codex", "tui", "workflow", "worktree"]
categories = ["command-line-utilities", "development-tools"]
exclude = [
    ".claude/**",
    "AGENTS.md",
    "CLAUDE.md",
    "docs/superpowers/**",
    "hooks/**",
    "workbridge-sidebar-playground.html",
]

[dependencies]
tui-term = "0.3"
vt100 = "0.15"
libc = "0.2"
signal-hook = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
regex = "1"
uuid = { version = "1", features = ["v4"] }
directories = "5"
rat-salsa = "4"
rat-widget = "3"
rat-event = "2"
crossbeam-channel = "0.5"
ratatui-core = "0.1"
ratatui-crossterm = "0.1"
ratatui-widgets = "0.3"
unicode-width = "0.2"
arboard = "3"
which = "6"

[features]
integration = []

[dev-dependencies]
insta = "1"
tempfile = "3"

[lints.rust]
# Nudge toward Rust 2018+ idioms: module path cleanliness, anonymous
# lifetimes, no bare trait objects, etc. Set to "warn" rather than
# "deny" so the group can be raised incrementally; CI's
# `-D warnings` then promotes any warning to an error.
# Baseline verified clean on 2026-04-21.
rust_2018_idioms = "warn"

[lints.clippy]
# Prohibit accidental dbg! / todo! / unimplemented! in committed code.
# Baseline verified clean on 2026-04-20.
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"

# Pedantic, nursery, and restriction carpet-bombs are intentionally
# not set here. They ship in Phase 3 of the hygiene campaign, which
# has the budget for cleaning the findings they produce. Raising them
# in Phase 1 would either require #[allow] in source (prohibited) or
# generate CI failures before the cleanup work exists.

[lints.rustdoc]
# No existing crate-level docs to break; safe to deny from day one.
broken_intra_doc_links = "deny"
